<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOD One Platform V8.2</title>
<meta name="description" content="SOD One Platform V8.2 - Dashboard e Fluxo da Oficina.">
<style>
:root{
  --bg:#07090d;--panel:#10141c;--card:#151a24;--card2:#1b2230;--soft:#202736;--line:rgba(255,255,255,.10);
  --text:#f6f7fb;--muted:#aab3c2;--orange:#ff7a00;--orange2:#ffad5c;--green:#29c56a;--red:#ff5252;--yellow:#facc15;--blue:#38bdf8;
  --shadow:0 24px 80px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,rgba(255,122,0,.18),transparent 30%),linear-gradient(180deg,#07090d,#0d1018 50%,#07090d);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}.container{width:min(1180px,92%);margin:auto}
button,input,select,textarea{font-family:inherit}
input,select,textarea{width:100%;padding:13px;border-radius:14px;border:1px solid var(--line);background:#0b0f16;color:#fff;outline:none}
textarea{min-height:94px;resize:vertical}label{font-size:13px;color:#dce1e8;font-weight:900;display:block;margin-bottom:7px}
.btn{border:0;border-radius:999px;padding:13px 18px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.18s}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#111;box-shadow:0 14px 35px rgba(255,122,0,.25)}
.btn.secondary{background:rgba(255,255,255,.06);border:1px solid var(--line);color:#fff}
.btn.danger{background:rgba(255,82,82,.14);border:1px solid rgba(255,82,82,.38);color:#ffd0d0}
.logo{display:flex;align-items:center;gap:12px;font-weight:900}
.logoMark{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,var(--orange),#ffc08a);color:#111;display:grid;place-items:center;font-weight:900;box-shadow:0 12px 30px rgba(255,122,0,.25)}
.badge{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,122,0,.32);background:rgba(255,122,0,.12);color:#ffd0aa;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:900}
.siteHeader{position:sticky;top:0;z-index:20;background:rgba(7,9,13,.82);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.nav{height:76px;display:flex;align-items:center;justify-content:space-between;gap:18px}
.navLinks{display:flex;gap:20px;color:var(--muted);font-weight:700;font-size:14px}
.hero{padding:84px 0 52px}
.heroGrid{display:grid;grid-template-columns:1.05fr .95fr;gap:38px;align-items:center}
.hero h1{font-size:clamp(42px,7vw,78px);line-height:.95;letter-spacing:-3px;margin:18px 0 22px}
.hero p{font-size:20px;color:var(--muted);max-width:680px;margin-bottom:28px}
.heroActions{display:flex;gap:12px;flex-wrap:wrap}
.mock{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:30px;padding:20px;box-shadow:var(--shadow)}
.mockScreen{background:#0b0f16;border:1px solid var(--line);border-radius:22px;padding:18px;min-height:420px}
.mockTop{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:16px}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:15px}
.kpi small{color:var(--muted);font-weight:800}.kpi b{display:block;font-size:30px;margin-top:7px;color:#fff}
.flow{display:grid;gap:10px;margin-top:14px}.flow div{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px;display:flex;justify-content:space-between;color:var(--muted)}.flow span{color:var(--orange2);font-weight:900}
.section{padding:70px 0}.sectionTitle{max-width:760px;margin-bottom:28px}
.sectionTitle h2{font-size:clamp(32px,5vw,52px);letter-spacing:-2px;line-height:1;margin-bottom:14px}
.sectionTitle p{color:var(--muted);font-size:18px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card,.panel{background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:24px;padding:24px}
.card h3{font-size:21px;margin-bottom:9px}.card p{color:var(--muted)}
.pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.price{background:var(--panel);border:1px solid var(--line);border-radius:26px;padding:26px}
.price.featured{border-color:rgba(255,122,0,.6);box-shadow:0 22px 60px rgba(255,122,0,.14)}
.price h3{font-size:28px}.price p{color:var(--muted);margin:8px 0 18px}
.price ul{list-style:none;display:grid;gap:10px;color:var(--muted)}.price li:before{content:"✓";color:var(--green);font-weight:900;margin-right:8px}
.cta{background:linear-gradient(135deg,rgba(255,122,0,.2),rgba(255,255,255,.055));border:1px solid var(--line);border-radius:34px;padding:54px;text-align:center;box-shadow:var(--shadow)}
.cta h2{font-size:clamp(34px,5vw,58px);letter-spacing:-2px;line-height:1;margin-bottom:14px}.cta p{color:var(--muted);font-size:18px;max-width:700px;margin:0 auto 24px}
.formWrap{min-height:100vh;display:grid;place-items:center;padding:24px}
.authCard{width:min(980px,100%);display:grid;grid-template-columns:.95fr 1.05fr;background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:34px;overflow:hidden;box-shadow:var(--shadow)}
.authForm{padding:34px}.authForm h1{font-size:44px;line-height:1;letter-spacing:-2px;margin:28px 0 12px}.authForm p{color:var(--muted);margin-bottom:22px}
.field{display:grid;gap:7px;margin-bottom:14px}.field label{font-size:13px;color:#dce1e8;font-weight:900}
.authSide{background:radial-gradient(circle at top,rgba(255,122,0,.24),rgba(255,255,255,.04));padding:34px;display:grid;align-content:center}
.authSide h2{font-size:34px;line-height:1.05;margin-bottom:16px}.authSide ul{list-style:none;display:grid;gap:12px;color:#dce1e8}.authSide li{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:16px;padding:13px}
.appShell{display:grid;grid-template-columns:290px minmax(0,1fr);min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:rgba(8,10,14,.94);border-right:1px solid var(--line);padding:20px 16px;overflow:auto}
.version{margin:14px 0 18px;border:1px solid rgba(255,122,0,.25);background:rgba(255,122,0,.09);color:#ffc08a;text-align:center;border-radius:999px;padding:8px;font-size:12px;font-weight:900}
.sideNav{display:grid;gap:7px}.sideNav button{background:transparent;border:1px solid transparent;color:#dce1e8;text-align:left;border-radius:14px;padding:12px;font-weight:800;cursor:pointer}
.sideNav button.active,.sideNav button:hover{background:linear-gradient(135deg,rgba(255,122,0,.95),rgba(255,173,92,.9));color:#111}
.group{font-size:11px;text-transform:uppercase;color:#68707c;font-weight:900;letter-spacing:.12em;margin:16px 8px 4px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(12,15,22,.86);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);padding:16px 22px;display:flex;justify-content:space-between;gap:18px;align-items:center}
.topbar h2{font-size:21px}.topbar small{color:var(--muted)}.workspace main{padding:22px;max-width:1700px;margin:auto}
.dashHero{display:grid;grid-template-columns:1.25fr .75fr;gap:16px;margin-bottom:16px}.dashHero .panel:first-child{background:linear-gradient(135deg,rgba(255,122,0,.18),rgba(255,255,255,.04))}
.dashHero h1{font-size:42px;letter-spacing:-1.5px;line-height:1;margin:10px 0}.muted{color:var(--muted)}
.dashboardGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.dashKpi{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:18px;cursor:pointer}
.dashKpi small{color:var(--muted);font-weight:900;text-transform:uppercase;font-size:11px}.dashKpi b{display:block;font-size:34px;margin-top:8px;color:#fff}.dashKpi span{color:var(--orange2);font-weight:800}
.grid2{display:grid;grid-template-columns:1.3fr .7fr;gap:14px}.list{display:grid;gap:10px}
.item{background:#10141d;border:1px solid var(--line);border-radius:16px;padding:13px;display:flex;justify-content:space-between;gap:10px;color:#dce1e8}
.item small{display:block;color:var(--muted);margin-top:3px}.pill{border-radius:999px;background:rgba(255,122,0,.14);border:1px solid rgba(255,122,0,.3);color:#ffc08a;padding:4px 8px;font-size:12px;font-weight:900;white-space:nowrap}
.notice{border-left:4px solid var(--orange);background:rgba(255,122,0,.08);border-radius:14px;padding:14px;color:#ffd9bd}
.table{width:100%;border-collapse:collapse;margin-top:14px}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left}.table th{color:#ffc08a}
.moduleGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:16px}

/* V8.2 */
.toolbar{display:grid;grid-template-columns:1fr 220px auto;gap:12px;align-items:end;margin-bottom:16px}
.board{display:grid;grid-template-columns:repeat(4,minmax(250px,1fr));gap:14px;align-items:start}
.column{background:rgba(16,20,29,.88);border:1px solid var(--line);border-radius:24px;padding:13px;min-height:390px}
.colHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.colHead h3{font-size:16px}.colCount{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:999px;padding:3px 8px;color:#cbd3df;font-weight:900;font-size:12px}
.osCard{background:linear-gradient(180deg,#1b2230,#121720);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:13px;margin-bottom:10px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.osCard:hover{transform:translateY(-2px);border-color:rgba(255,122,0,.55);box-shadow:0 18px 40px rgba(0,0,0,.26)}
.osCard h4{font-size:17px;margin-bottom:5px}.osMeta{color:var(--muted);font-size:13px;display:grid;gap:3px}
.osTags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;background:rgba(255,255,255,.08);border:1px solid var(--line);color:#dce1e8}
.tag.orange{background:rgba(255,122,0,.12);border-color:rgba(255,122,0,.35);color:#ffc08a}.tag.green{background:rgba(41,197,106,.12);border-color:rgba(41,197,106,.35);color:#9ff0bc}.tag.yellow{background:rgba(250,204,21,.12);border-color:rgba(250,204,21,.35);color:#ffe78a}.tag.blue{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.35);color:#aee7ff}
.osActions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:11px}
.osActions button{border:1px solid var(--line);background:#0d1119;color:#fff;border-radius:12px;padding:8px;font-weight:900;cursor:pointer;font-size:12px}
.formGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.drawerBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:80}
.drawerBg.show{display:block}
.drawer{position:fixed;right:0;top:0;height:100%;width:min(760px,96vw);background:#0d1119;border-left:1px solid var(--line);box-shadow:-20px 0 70px rgba(0,0,0,.45);padding:20px;overflow:auto}
.drawerTop{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}
.drawer h2{font-size:30px;letter-spacing:-1px}.drawerSection{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:12px}
.timeline{display:grid;gap:8px}.timeline div{background:#10141d;border:1px solid var(--line);border-radius:14px;padding:10px;color:#dce1e8}
.empty{border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.025);border-radius:18px;padding:20px;text-align:center;color:var(--muted)}
@media(max-width:1200px){.board{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}}
@media(max-width:980px){.heroGrid,.cards,.pricing,.authCard,.appShell,.dashHero,.grid2{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.dashboardGrid{grid-template-columns:repeat(2,1fr)}.navLinks{display:none}.formGrid{grid-template-columns:1fr}}
@media(max-width:560px){.heroActions .btn,.btn.full{width:100%}.kpis,.dashboardGrid,.board{grid-template-columns:1fr}.hero h1{letter-spacing:-2px}.cta{padding:30px}.authSide{display:none}.workspace main{padding:14px}.drawer{width:100%}}
</style>
</head>
<body>
<div id="app"></div>
<div id="drawerBg" class="drawerBg"></div>
<script>
const USER_KEY = "sodone_v82_user";
const OFFICES_KEY = "sodone_v82_offices";
const ORDERS_KEY = "sodone_v82_orders";
const $ = (s)=>document.querySelector(s);
const stages = ["Entrada","Diagnóstico","Aguardando aprovação","Aguardando peças","Execução","Controle de qualidade","Entrega","Pós-venda"];

function getUser(){ try{return JSON.parse(localStorage.getItem(USER_KEY))}catch(e){return null} }
function setUser(u){ localStorage.setItem(USER_KEY, JSON.stringify(u)); }
function logout(){ localStorage.removeItem(USER_KEY); go('/login'); }
function getOffices(){ try{return JSON.parse(localStorage.getItem(OFFICES_KEY)||"{}")}catch(e){return {}} }
function saveOffice(o){ const offices=getOffices(); offices[o.id]=o; localStorage.setItem(OFFICES_KEY, JSON.stringify(offices)); }
function getOffice(id){ return getOffices()[id] || null; }
function getOrders(){ try{return JSON.parse(localStorage.getItem(ORDERS_KEY)||"[]")}catch(e){return []} }
function saveOrders(list){ localStorage.setItem(ORDERS_KEY, JSON.stringify(list)); }
function myOrders(){ const u=getUser(); return getOrders().filter(o=>o.organization_id===u?.organization_id); }
function seedDalpiva(){
  const office={id:"office_dalpiva_demo",name:"Dalpiva Centro Técnico",responsible:"Joel Dalpiva",email:"gordodalpiva@gmail.com",plan:"Plus",status:"active",createdAt:new Date().toISOString()};
  saveOffice(office);
  setUser({id:"user_joel_demo",name:"Joel Dalpiva",email:office.email,role:"owner",organization_id:office.id});
  if(myOrders().length===0){
    const now = new Date().toISOString();
    saveOrders([
      {id:id(),organization_id:office.id,vehicle:"Hilux SW4",plate:"ABC1D23",client:"João Silva",phone:"",km:"182000",stage:"Diagnóstico",complaint:"Ruído na suspensão dianteira e revisão geral.",budget:0,priority:"Alta",responsible:"Joel",photos:2,createdAt:now,history:["OS criada em modo demonstração","Veículo entrou em diagnóstico"]},
      {id:id(),organization_id:office.id,vehicle:"Renegade Diesel",plate:"BRA2E19",client:"Auto Center Demo",phone:"",km:"97000",stage:"Execução",complaint:"Vazamento de diesel na bomba de alta.",budget:2450,priority:"Normal",responsible:"César",photos:5,createdAt:now,history:["Orçamento aprovado","Peças separadas para execução"]},
      {id:id(),organization_id:office.id,vehicle:"Saveiro Robust",plate:"SOD8A82",client:"Cliente Teste",phone:"",km:"4200",stage:"Entrega",complaint:"AF perdido após bateria descarregada.",budget:380,priority:"Normal",responsible:"Joel",photos:1,createdAt:now,history:["Serviço finalizado","Aguardando entrega"]},
      {id:id(),organization_id:office.id,vehicle:"Amarok V6",plate:"V6D0M01",client:"Revenda Exemplo",phone:"",km:"118000",stage:"Aguardando aprovação",complaint:"Superaquecimento e perda de água.",budget:12450,priority:"Alta",responsible:"Joel",photos:8,createdAt:now,history:["Diagnóstico concluído","Orçamento enviado ao cliente"]}
    ]);
  }
}
function id(){return "id_"+Math.random().toString(36).slice(2)+"_"+Date.now()}
function fmtMoney(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function go(path){ location.hash=path; }
window.addEventListener("hashchange", router);
window.addEventListener("load", router);

function logo(){ return '<div class="logo"><div class="logoMark">S1</div><div>SOD One</div></div>'; }
function router(){
  const path=location.hash.replace("#","")||"/";
  if(path==="/login") return renderLogin();
  if(path==="/signup") return renderSignup();
  if(path==="/app") return renderApp();
  if(path==="/admin") return renderAdmin();
  renderSite();
}
function renderSite(){
  $("#app").innerHTML=`
  <header class="siteHeader"><div class="container nav">${logo()}<nav class="navLinks"><a href="#recursos">Recursos</a><a href="#planos">Planos</a><a href="#saas">SaaS</a></nav><button class="btn primary" onclick="go('/login')">Entrar</button></div></header>
  <main>
    <section class="hero"><div class="container heroGrid"><div><div class="badge">🚀 SOD One Platform V8.2</div><h1>Fluxo da Oficina agora entra na plataforma.</h1><p>A V8.2 inaugura o primeiro módulo operacional do SaaS: Dashboard + Fluxo da Oficina + OS rápida, pronto para conectar ao Supabase.</p><div class="heroActions"><button class="btn primary" onclick="go('/signup')">Criar oficina</button><button class="btn secondary" onclick="go('/login')">Acessar app</button></div></div><div class="mock"><div class="mockScreen"><div class="mockTop"><span>● SOD V8.2</span><span>Operação</span></div><div class="kpis"><div class="kpi"><small>Veículos</small><b>12</b></div><div class="kpi"><small>Execução</small><b>4</b></div><div class="kpi"><small>Aprovação</small><b>3</b></div><div class="kpi"><small>Hoje</small><b>5</b></div></div><div class="flow"><div><b>Hilux • Diagnóstico</b><span>Abrir</span></div><div><b>Renegade • Execução</b><span>Abrir</span></div><div><b>Amarok • Aprovação</b><span>Abrir</span></div><div><b>Saveiro • Entrega</b><span>Abrir</span></div></div></div></div></div></section>
    <section id="recursos" class="section"><div class="container"><div class="sectionTitle"><h2>Primeiro módulo operacional.</h2><p>Agora o SOD One não é só uma landing page com login. Ele já tem um painel funcional de oficina.</p></div><div class="cards"><div class="card"><h3>🚗 Fluxo da oficina</h3><p>Cards por etapa, busca, filtros e troca rápida de status.</p></div><div class="card"><h3>🧾 OS rápida</h3><p>Cadastre veículo, cliente, reclamação, orçamento e responsável.</p></div><div class="card"><h3>📂 Ficha da OS</h3><p>Ao clicar no card, abre uma ficha com histórico e dados principais.</p></div><div class="card"><h3>📊 Dashboard</h3><p>Indicadores operacionais calculados com base nas OS cadastradas.</p></div><div class="card"><h3>🏢 Multiempresa</h3><p>Dados separados por oficina no modelo local, pronto para Supabase.</p></div><div class="card"><h3>🧠 Próximo: Base técnica</h3><p>Depois do fluxo, vamos conectar OS e Base Técnica inteligente.</p></div></div></div></section>
    <section id="planos" class="section"><div class="container"><div class="sectionTitle"><h2>Planos comerciais.</h2><p>Estrutura inicial para vender o SOD One como produto SaaS.</p></div><div class="pricing"><div class="price"><h3>Basic</h3><p>Para organizar a operação.</p><ul><li>Fluxo da oficina</li><li>Veículos</li><li>Checklist</li><li>Orçamentos</li></ul></div><div class="price featured"><div class="badge">Mais indicado</div><h3>Plus</h3><p>Para oficina em crescimento.</p><ul><li>Tudo do Basic</li><li>Estoque</li><li>Pós-venda</li><li>Base técnica</li><li>Fotos e relatórios</li></ul></div><div class="price"><h3>Pro</h3><p>Para gestão avançada.</p><ul><li>Tudo do Plus</li><li>Indicadores</li><li>Multiusuário</li><li>IA SOD</li><li>Suporte prioritário</li></ul></div></div></div></section>
    <section id="saas" class="section"><div class="container"><div class="cta"><h2>V8.2 pronta para operação inicial.</h2><p>Substitua apenas o index.html e teste o fluxo da oficina online.</p><button class="btn primary" onclick="go('/signup')">Criar oficina demo</button></div></div></section>
  </main>`;
}
function renderLogin(){
  $("#app").innerHTML=`<main class="formWrap"><section class="authCard"><div class="authForm">${logo()}<h1>Entrar no SOD One</h1><p>Acesso ao ambiente da oficina.</p><div class="field"><label>E-mail</label><input type="email" placeholder="joel@oficina.com.br"></div><div class="field"><label>Senha</label><input type="password" placeholder="Digite sua senha"></div><button class="btn primary full" onclick="seedDalpiva();go('/app')">Entrar em modo demonstração</button><div style="height:12px"></div><button class="btn secondary full" onclick="go('/signup')">Criar oficina</button><p style="margin-top:18px"><a href="#" onclick="go('/')">← Voltar ao site</a></p></div><div class="authSide"><h2>Login pronto para Supabase.</h2><ul><li>✅ Login visual</li><li>✅ Organização por oficina</li><li>✅ Plano comercial</li><li>⏳ Próximo: autenticação real</li></ul></div></section></main>`;
}
function renderSignup(){
  $("#app").innerHTML=`<main class="formWrap"><section class="authCard"><div class="authForm">${logo()}<h1>Criar oficina</h1><p>Primeiro cadastro comercial do SOD One Platform.</p><div class="field"><label>Nome da oficina</label><input id="oficina" value="Dalpiva Centro Técnico"></div><div class="field"><label>Responsável</label><input id="responsavel" value="Joel Dalpiva"></div><div class="field"><label>E-mail</label><input id="email" type="email" value="gordodalpiva@gmail.com"></div><div class="field"><label>Plano</label><select id="plano"><option>Basic</option><option selected>Plus</option><option>Pro</option></select></div><button class="btn primary full" onclick="criarOficina()">Criar e acessar</button><p style="margin-top:18px"><a href="#" onclick="go('/login')">Já tenho conta</a></p></div><div class="authSide"><h2>Modelo SaaS desde a fundação.</h2><ul><li>🏢 Oficina = organização</li><li>👤 Usuário vinculado</li><li>💳 Plano salvo</li><li>🔒 Dados isolados por organization_id</li></ul></div></section></main>`;
}
function criarOficina(){
  const office={id:"office_"+Date.now(),name:$("#oficina").value||"Oficina",responsible:$("#responsavel").value||"Responsável",email:$("#email").value||"demo@sodone.com.br",plan:$("#plano").value||"Plus",status:"active",createdAt:new Date().toISOString()};
  saveOffice(office); setUser({id:"user_"+Date.now(),name:office.responsible,email:office.email,role:"owner",organization_id:office.id}); go("/app");
}
function renderApp(){
  const user=getUser(); if(!user){go("/login");return}
  let office=getOffice(user.organization_id); if(!office){seedDalpiva(); office=getOffice("office_dalpiva_demo")}
  $("#app").innerHTML=`<div class="appShell"><aside class="sidebar"><div class="logo"><div class="logoMark">S1</div><div><b>SOD One</b><br><small class="muted">Platform V8.2</small></div></div><div class="version">SaaS Operacional • ${office.plan}</div><nav class="sideNav"><button class="active" onclick="appTab('dash',this)">🏠 Dashboard</button><div class="group">Operação</div><button onclick="appTab('fluxo',this)">🚗 Fluxo da oficina</button><button onclick="appTab('novaos',this)">➕ Nova OS</button><button onclick="appTab('veiculos',this)">🚘 Veículos</button><button onclick="appTab('checklist',this)">📋 Checklist</button><button onclick="appTab('orcamentos',this)">💰 Orçamentos</button><button onclick="appTab('pecas',this)">📦 Estoque</button><div class="group">Inteligência</div><button onclick="appTab('base',this)">🧠 Base técnica</button><button onclick="appTab('pos',this)">🤝 Pós-venda</button><button onclick="appTab('legacy',this)">🧩 Migração V7</button><div class="group">Conta</div><button onclick="appTab('config',this)">⚙ Configurações</button><button onclick="go('/admin')">🛡 Admin SOD</button></nav></aside><div class="workspace"><header class="topbar"><div><h2>${office.name}</h2><small>${user.name} • ${user.role} • ${office.plan}</small></div><button class="btn secondary" onclick="logout()">Sair</button></header><main id="appContent"></main></div></div>`;
  renderAppTab("dash");
}
function appTab(tab,btn){document.querySelectorAll(".sideNav button").forEach(b=>b.classList.remove("active")); if(btn)btn.classList.add("active"); renderAppTab(tab)}
function renderAppTab(tab){
  const c=$("#appContent");
  if(tab==="dash") return renderDashboard(c);
  if(tab==="fluxo") return renderFluxo(c);
  if(tab==="novaos") return renderNovaOS(c);
  if(tab==="legacy") return renderLegacy(c);
  if(tab==="config") return renderConfig(c);
  c.innerHTML=`<section class="panel"><h2>${tabTitle(tab)}</h2><p class="muted">Módulo reservado para migração da V7.0.6 para a Platform V8.2.</p><div class="notice" style="margin-top:16px">Depois do Fluxo da Oficina, este será conectado ao banco real.</div></section>`;
}
function calcStats(){
  const orders=myOrders();
  const total=orders.length;
  const diag=orders.filter(o=>o.stage==="Diagnóstico").length;
  const approval=orders.filter(o=>o.stage==="Aguardando aprovação").length;
  const exec=orders.filter(o=>o.stage==="Execução").length;
  const waiting=orders.filter(o=>o.stage==="Aguardando peças").length;
  const delivery=orders.filter(o=>o.stage==="Entrega" || o.stage==="Controle de qualidade").length;
  const pos=orders.filter(o=>o.stage==="Pós-venda").length;
  const budget=orders.reduce((s,o)=>s+Number(o.budget||0),0);
  return {orders,total,diag,approval,exec,waiting,delivery,pos,budget};
}
function renderDashboard(c){
  const s=calcStats();
  c.innerHTML=`<section><div class="dashHero"><div class="panel"><div class="badge">Centro de Controle V8.2</div><h1>Operação da oficina em tempo real.</h1><p class="muted">Agora o dashboard lê as OS cadastradas no Fluxo da Oficina.</p></div><div class="panel"><h3>Próxima ação recomendada</h3><p class="muted" style="margin:10px 0 16px">${s.approval>0 ? "Existem veículos aguardando aprovação. Priorize o contato com o cliente." : s.waiting>0 ? "Existem veículos aguardando peças. Verifique fornecedores." : "Fluxo sob controle. Cadastre a próxima OS."}</p><button class="btn primary" onclick="appTab('fluxo')">Abrir Fluxo</button></div></div>
  <div class="dashboardGrid">
    <div class="dashKpi" onclick="appTab('fluxo')"><small>Veículos ativos</small><b>${s.total}</b><span>na operação</span></div>
    <div class="dashKpi" onclick="appTab('fluxo')"><small>Diagnóstico</small><b>${s.diag}</b><span>em análise</span></div>
    <div class="dashKpi" onclick="appTab('fluxo')"><small>Aprovação</small><b>${s.approval}</b><span>cliente decidir</span></div>
    <div class="dashKpi" onclick="appTab('fluxo')"><small>Execução</small><b>${s.exec}</b><span>em serviço</span></div>
  </div>
  <div class="grid2">
    <div class="panel"><h3>Prioridades operacionais</h3><div class="list" style="margin-top:12px">${priorityList(s)}</div></div>
    <div class="panel"><h3>Resumo comercial</h3><div class="list" style="margin-top:12px"><div class="item"><b>Orçamentos em cards</b><span class="pill">${fmtMoney(s.budget)}</span></div><div class="item"><b>Aguardando peças</b><span class="pill">${s.waiting}</span></div><div class="item"><b>Entregas / CQ</b><span class="pill">${s.delivery}</span></div><div class="item"><b>Pós-venda</b><span class="pill">${s.pos}</span></div></div></div>
  </div></section>`;
}
function priorityList(s){
  const arr=[];
  s.orders.filter(o=>["Alta","Urgente"].includes(o.priority)).slice(0,5).forEach(o=>arr.push(`<div class="item" onclick="openOrder('${o.id}')"><div><b>${o.vehicle} • ${o.plate}</b><small>${o.stage} • ${o.client}</small></div><span class="pill">${o.priority}</span></div>`));
  if(!arr.length) arr.push(`<div class="item"><div><b>Nenhuma prioridade crítica</b><small>Operação sem alerta alto no momento.</small></div><span class="pill">OK</span></div>`);
  return arr.join("");
}
function renderFluxo(c){
  c.innerHTML=`<section><div class="dashHero"><div class="panel"><div class="badge">Fluxo da Oficina</div><h1>Painel vivo dos veículos.</h1><p class="muted">Cadastre OS, acompanhe por etapa e abra a ficha completa do veículo.</p></div><div class="panel"><h3>Ação rápida</h3><p class="muted" style="margin:10px 0 16px">Crie uma OS e ela entra automaticamente no fluxo.</p><button class="btn primary" onclick="appTab('novaos')">+ Nova OS</button></div></div>
  <div class="toolbar"><div><label>Buscar</label><input id="buscaFluxo" placeholder="Placa, cliente, veículo ou reclamação" oninput="renderBoard()"></div><div><label>Etapa</label><select id="filtroEtapa" onchange="renderBoard()"><option value="">Todas</option>${stages.map(s=>`<option>${s}</option>`).join("")}</select></div><button class="btn secondary" onclick="seedDalpiva();renderBoard()">Carregar demo</button></div>
  <div id="board" class="board"></div></section>`;
  renderBoard();
}
function renderBoard(){
  const board=$("#board"); if(!board) return;
  const q=($("#buscaFluxo")?.value||"").toLowerCase();
  const etapa=$("#filtroEtapa")?.value||"";
  let orders=myOrders().filter(o=>{
    const hay=[o.vehicle,o.plate,o.client,o.complaint,o.stage,o.responsible].join(" ").toLowerCase();
    return (!q || hay.includes(q)) && (!etapa || o.stage===etapa);
  });
  const visibleStages = etapa ? [etapa] : stages;
  board.innerHTML = visibleStages.map(stage=>{
    const list=orders.filter(o=>o.stage===stage);
    return `<div class="column"><div class="colHead"><h3>${stage}</h3><span class="colCount">${list.length}</span></div>${list.map(orderCard).join("") || `<div class="empty">Nenhuma OS nesta etapa.</div>`}</div>`;
  }).join("");
}
function orderCard(o){
  const tagClass = o.priority==="Alta" || o.priority==="Urgente" ? "yellow" : "blue";
  return `<div class="osCard" onclick="openOrder('${o.id}')"><h4>${o.vehicle || "Veículo"}</h4><div class="osMeta"><span>Placa: <b>${o.plate||"-"}</b></span><span>Cliente: ${o.client||"-"}</span><span>Resp.: ${o.responsible||"-"}</span></div><div class="osTags"><span class="tag orange">${fmtMoney(o.budget)}</span><span class="tag ${tagClass}">${o.priority||"Normal"}</span><span class="tag green">📸 ${o.photos||0}</span></div><div class="osActions" onclick="event.stopPropagation()"><button onclick="moveOrder('${o.id}',-1)">← Voltar</button><button onclick="moveOrder('${o.id}',1)">Avançar →</button></div></div>`;
}
function moveOrder(orderId,dir){
  const list=getOrders();
  const idx=list.findIndex(o=>o.id===orderId);
  if(idx<0) return;
  const current=stages.indexOf(list[idx].stage);
  const next=Math.max(0,Math.min(stages.length-1,current+dir));
  list[idx].stage=stages[next];
  list[idx].history = list[idx].history || [];
  list[idx].history.push("Movido para: " + stages[next] + " em " + new Date().toLocaleString("pt-BR"));
  saveOrders(list); renderBoard();
}
function renderNovaOS(c){
  c.innerHTML=`<section class="panel"><h2>➕ Nova Ordem de Serviço</h2><p class="muted" style="margin:8px 0 18px">Cadastro rápido para alimentar o Fluxo da Oficina.</p>
  <div class="formGrid">
    <div><label>Veículo</label><input id="osVehicle" placeholder="Ex: Hilux SW4"></div>
    <div><label>Placa</label><input id="osPlate" placeholder="ABC1D23"></div>
    <div><label>Cliente</label><input id="osClient" placeholder="Nome do cliente"></div>
    <div><label>Telefone</label><input id="osPhone" placeholder="WhatsApp"></div>
    <div><label>KM</label><input id="osKm" placeholder="Ex: 182000"></div>
    <div><label>Etapa inicial</label><select id="osStage">${stages.map(s=>`<option>${s}</option>`).join("")}</select></div>
    <div><label>Prioridade</label><select id="osPriority"><option>Normal</option><option>Alta</option><option>Urgente</option></select></div>
    <div><label>Responsável</label><input id="osResponsible" placeholder="Joel, César, Letícia..."></div>
    <div><label>Orçamento previsto R$</label><input id="osBudget" type="number" step="0.01" placeholder="0,00"></div>
  </div>
  <div style="margin-top:12px"><label>Reclamação / observação inicial</label><textarea id="osComplaint" placeholder="Descreva a reclamação do cliente e primeira observação técnica."></textarea></div>
  <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn primary" onclick="saveNewOrder()">Salvar OS</button><button class="btn secondary" onclick="appTab('fluxo')">Voltar ao fluxo</button></div></section>`;
}
function saveNewOrder(){
  const u=getUser();
  const order={id:id(),organization_id:u.organization_id,vehicle:$("#osVehicle").value,plate:$("#osPlate").value.toUpperCase(),client:$("#osClient").value,phone:$("#osPhone").value,km:$("#osKm").value,stage:$("#osStage").value,priority:$("#osPriority").value,responsible:$("#osResponsible").value,budget:Number($("#osBudget").value||0),complaint:$("#osComplaint").value,photos:0,createdAt:new Date().toISOString(),history:["OS criada em "+new Date().toLocaleString("pt-BR")]};
  const list=getOrders(); list.push(order); saveOrders(list); appTab("fluxo");
}
function openOrder(orderId){
  const o=getOrders().find(x=>x.id===orderId);
  if(!o) return;
  const bg=$("#drawerBg");
  bg.classList.add("show");
  bg.innerHTML=`<div class="drawer"><div class="drawerTop"><div><div class="badge">Ficha da OS</div><h2>${o.vehicle}</h2><p class="muted">${o.plate} • ${o.client}</p></div><button class="btn secondary" onclick="closeDrawer()">Fechar</button></div>
  <div class="drawerSection"><h3>Dados principais</h3><div class="dashboardGrid" style="grid-template-columns:repeat(2,1fr);margin-top:12px"><div class="dashKpi"><small>Etapa</small><b style="font-size:22px">${o.stage}</b><span>fluxo</span></div><div class="dashKpi"><small>Orçamento</small><b style="font-size:22px">${fmtMoney(o.budget)}</b><span>previsto</span></div><div class="dashKpi"><small>Prioridade</small><b style="font-size:22px">${o.priority}</b><span>atenção</span></div><div class="dashKpi"><small>Fotos</small><b style="font-size:22px">${o.photos||0}</b><span>evidências</span></div></div></div>
  <div class="drawerSection"><h3>Reclamação / observação</h3><p class="muted" style="margin-top:8px">${o.complaint||"Sem observação."}</p></div>
  <div class="drawerSection"><h3>Ações rápidas</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><button class="btn secondary" onclick="moveFromDrawer('${o.id}',-1)">← Voltar etapa</button><button class="btn primary" onclick="moveFromDrawer('${o.id}',1)">Avançar etapa</button><button class="btn danger" onclick="deleteOrder('${o.id}')">Remover OS</button></div></div>
  <div class="drawerSection"><h3>Histórico</h3><div class="timeline" style="margin-top:10px">${(o.history||[]).map(h=>`<div>${h}</div>`).join("")||"<div>Sem histórico.</div>"}</div></div>
  <div class="drawerSection"><h3>Próximo V8.3</h3><p class="muted" style="margin-top:8px">Nesta ficha entram cliente completo, fotos, checklist, orçamento, peças, serviços e Base Técnica relacionada.</p></div>
  </div>`;
}
function closeDrawer(){ const bg=$("#drawerBg"); bg.classList.remove("show"); bg.innerHTML=""; }
function moveFromDrawer(id,dir){ moveOrder(id,dir); const o=getOrders().find(x=>x.id===id); if(o) openOrder(id); }
function deleteOrder(idv){
  if(!confirm("Remover esta OS?")) return;
  saveOrders(getOrders().filter(o=>o.id!==idv)); closeDrawer(); renderBoard(); 
}
function renderLegacy(c){
  c.innerHTML=`<section class="panel"><h2>🧩 Migração da V7.0.6</h2><p class="muted" style="margin:8px 0 16px">A V7.0.6 Foundation continua sendo a base operacional validada. A V8.2 inicia a migração pelo Fluxo da Oficina.</p><div class="notice"><b>Estratégia:</b> preservar o que funciona na V7 e transformar em módulos conectados ao banco.</div><div class="moduleGrid">${moduleCard("Centro de Controle","Dashboard","Em andamento")}${moduleCard("Operação da Oficina","Fluxo","V8.2 iniciado")}${moduleCard("Veículos / Placa","Veículos","V8.3")}${moduleCard("Checklist","Checklist","V8.3")}${moduleCard("Orçamento","Orçamentos","V8.3")}${moduleCard("Peças / Estoque","Estoque","V8.4")}${moduleCard("Base Técnica","Inteligência SOD","V8.4")}${moduleCard("Pós-venda","CRM","V8.5")}</div></section>`;
}
function renderConfig(c){
  const u=getUser(),o=getOffice(u.organization_id);
  c.innerHTML=`<section class="panel"><h2>⚙ Configuração da oficina</h2><p class="muted">Cadastro da organização dentro do modelo comercial.</p><div class="dashboardGrid" style="margin-top:16px"><div class="dashKpi"><small>Oficina</small><b style="font-size:22px">${o?.name||"Oficina"}</b><span>organização</span></div><div class="dashKpi"><small>Responsável</small><b style="font-size:22px">${o?.responsible||u.name}</b><span>owner</span></div><div class="dashKpi"><small>E-mail</small><b style="font-size:18px">${o?.email||u.email}</b><span>login</span></div><div class="dashKpi"><small>Plano</small><b style="font-size:24px">${o?.plan||"Plus"}</b><span>assinatura</span></div></div></section>`;
}
function moduleCard(from,to,p){return `<div class="card"><h3>${from}</h3><p>Migrar para: <b>${to}</b></p><div class="pill" style="display:inline-flex;margin-top:12px">${p}</div></div>`}
function tabTitle(tab){return {fluxo:"🚗 Fluxo da oficina",novaos:"➕ Nova OS",veiculos:"🚘 Veículos",checklist:"📋 Checklist",orcamentos:"💰 Orçamentos",pecas:"📦 Estoque",base:"🧠 Base técnica",pos:"🤝 Pós-venda"}[tab]||"Módulo"}
function renderAdmin(){
  const offices=Object.values(getOffices());
  $("#app").innerHTML=`<div class="appShell"><aside class="sidebar"><div class="logo"><div class="logoMark">S1</div><div><b>SOD Admin</b><br><small class="muted">Painel interno</small></div></div><div class="version">Admin Platform V8.2</div><nav class="sideNav"><button class="active">🏢 Oficinas</button><button onclick="go('/app')">⬅ Voltar ao app</button><button onclick="logout()">Sair</button></nav></aside><div class="workspace"><header class="topbar"><div><h2>Painel administrativo</h2><small>Controle comercial do SOD One</small></div></header><main><section class="panel"><h2>Oficinas cadastradas</h2><p class="muted">Na versão real, esse painel vai controlar clientes, planos, status, suporte e assinaturas.</p><table class="table"><thead><tr><th>Oficina</th><th>Responsável</th><th>E-mail</th><th>Plano</th><th>Status</th></tr></thead><tbody>${offices.map(o=>`<tr><td>${o.name}</td><td>${o.responsible}</td><td>${o.email}</td><td>${o.plan}</td><td><span class="pill">${o.status}</span></td></tr>`).join("")||`<tr><td colspan="5">Nenhuma oficina cadastrada ainda.</td></tr>`}</tbody></table></section></main></div></div>`;
}
</script>
</body>
</html>
